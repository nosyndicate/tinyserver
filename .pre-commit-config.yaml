default_stages: [pre-commit]
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      # Auto-format code first
      - id: ruff-format
        types_or: [python, pyi]
        stages: [pre-commit]

      # Lint and auto-fix issues
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
        stages: [pre-commit]

  - repo: local
    hooks:
      # Fast test subset on commit
      - id: pytest-fast
        name: pytest fast checks
        entry: python -m pytest tests/executor/test_worker.py -v --override-ini="addopts="
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Full test suite on push
      - id: pytest-all
        name: pytest all tests (pre-push)
        entry: python -m pytest tests/ -v --override-ini="addopts="
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
